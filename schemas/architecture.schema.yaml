title: Zephyr Architecture V1
description: >
  Schema reference for zephyr-workbench architecture models.
  This document describes every field that validation.py enforces.
  Use `zephyr reference` for a compact CLI-friendly listing.

# ── Required top-level fields ────────────────────────────────────────────────

required:
  - name
  - components
  - flows

properties:

  name:
    type: string
    description: Stable architecture identifier shown in CLI output.

  description:
    type: string
    required: false

  meta:
    type: mapping
    required: false
    properties:
      owner:
        type: string
        required: false
      version:
        type: string
        required: false
        example: "v1"
      criticality:
        type: string
        required: false
        allowed: [low, medium, high, mission-critical]
      environment:
        type: list[string]
        required: false
        allowed: [prod, test, dev]

  domains:
    type: list[string]
    required: false
    allowed: [business, application, data, technology]

  components:
    type: array
    min_items: 1
    item_required:
      - name
      - type
    item_properties:
      name:
        type: string
      type:
        type: string
        allowed:
          - access-gateway
          - access-policy
          - actor
          - application
          - cloud-identity
          - device-management
          - endpoint
          - identity
          - identity-provider
          - on-prem-identity
          - on-prem-resource
          - pki
          - remote-access
          - security-control
      description:
        type: string
        required: false
      domain:
        type: string
        required: false
        allowed: [business, application, data, technology]
      criticality:
        type: string
        required: false
        allowed: [low, medium, high, mission-critical]
      exposure:
        type: string
        required: false
        allowed: [internal, external]
      lifecycle:
        type: string
        required: false
        allowed: [planned, active, deprecated]

  flows:
    type: array
    min_items: 0
    item_required:
      - from
      - to
    item_properties:
      from:
        type: string
        description: Must match a component name.
      to:
        type: string
        description: Must match a component name.
      label:
        type: string
        required: false
      protocol:
        type: string
        required: false
      authentication:
        type: string
        required: false
        allowed: [none, password, mfa, certificate]
      encryption:
        type: string
        required: false
        allowed: [none, tls, ipsec]
      direction:
        type: string
        required: false
        allowed: [inbound, outbound, bidirectional]

  risks:
    type: array
    min_items: 0
    item_required:
      - id
      - title
      - severity
    item_properties:
      id:
        type: string
        description: Unique risk identifier (e.g. R1).
      title:
        type: string
      severity:
        type: string
        allowed: [low, medium, high, critical]
      description:
        type: string
        required: false
      mitigation:
        type: string
        required: false
      likelihood:
        type: string
        required: false
        allowed: [low, medium, high]
      impact:
        type: string
        required: false
        allowed: [low, medium, high]

  controls:
    type: array
    min_items: 0
    item_required:
      - name
      - type
      - applies_to
    item_properties:
      name:
        type: string
      type:
        type: string
        allowed: [policy, technical, process]
      applies_to:
        type: list[string]
        description: Each entry must match a component name.
      description:
        type: string
        required: false

  stakeholders:
    type: array
    min_items: 0
    item_required:
      - name
      - role
    item_properties:
      name:
        type: string
      role:
        type: string
        allowed: [owner, user, operator, security]

  rules:
    type: mapping
    required: false
    description: >
      Optional per-model field requirements. Generates warnings (not errors)
      when fields are missing. Does not affect hard validation.
    properties:
      require:
        type: mapping
        keys: [component, flow, risk, control, stakeholder]
        values:
          type: list[string]
          description: Field names that must be non-empty on each item.
        example:
          require:
            component: [criticality, domain]
            risk: [mitigation]

# ── Uniqueness constraints ────────────────────────────────────────────────────

uniqueness:
  - components[*].name
  - risks[*].id

# ── Cross-reference constraints ───────────────────────────────────────────────

references:
  - flows[*].from  → components[*].name
  - flows[*].to    → components[*].name
  - controls[*].applies_to[*] → components[*].name
